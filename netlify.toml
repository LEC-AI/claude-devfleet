[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # Set VITE_API_URL in Netlify dashboard:
  # Site settings → Environment variables → VITE_API_URL = https://devfleet.yourdomain.com

# API proxy — Netlify forwards /api/* to the backend server-side
# Update the `to` URL when the backend moves (Railway, ngrok, etc.)
[[redirects]]
  from = "/api/*"
  to = "https://farhanfleet.nexis365.com.au/api/:splat"
  status = 200
  force = true

# SPA fallback — must come after the API proxy
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
